apiVersion: everest.percona.com/v2alpha1
kind: DataStore
metadata:
  name: psmdb-cluster
  namespace: everest
spec:
  # Provider identifier
  provider: psmdb

  # Topology configuration
  topology:
    type: sharded
    config:
      # Topology-specific configuration (schema defined by provider)
      shards: 3

  # Global provider configuration
  global:
    allowUnsafeFlags: true
    # Additional global settings...
    splitHorizonDNSConfigName: mySplitHorizonConfig

  # Component instances
  components:
    # Main database engine (required for sharded topology)
    engine:
      type: mongod
      version: 8.0.8-3
      replicas: 3
      storage:
        size: 10Gi
        storageClass: standard
      resources:
        cpu: 2
        memory: 4Gi
      config:
        configMapRef:
          name: psmdb-custom-config
        key: mongod.conf

    # Proxy/router (required for sharded topology)
    proxy:
      type: mongos
      version: 8.0.8-3
      replicas: 3
      service:
        exposeType: LoadBalancer

    # Config server (required for sharded topology)
    configServer:
      type: mongod
      version: 8.0.8-3
      replicas: 3
      storage:
        size: 5Gi

    # Backup agent (optional)
    backupAgent:
      type: backup
      version: 2.9.1
      replicas: 1

    # Monitoring (optional)
    monitoring:
      type: pmm
      version: 2.44.1
      config:
        # Reference to monitoring configuration
        secretRef:
          name: pmm-config
        key: pmm.yaml

