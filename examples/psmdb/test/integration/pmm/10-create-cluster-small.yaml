apiVersion: kuttl.dev/v1
kind: TestStep
timeout: 10
---
apiVersion: everest.percona.com/v2alpha1
kind: DataStore
metadata:
  name: psmdb-mc
spec:
  provider: psmdb
  components:
    engine:
      type: mongod
      replicas: 3
      storage:
        size: 4Gi
      resources:
        limits:
          cpu: 300m
          memory: 500M
    proxy:
      type: mongod
      replicas: 1
    monitoring:
      type: pmm
      version: 2.44.1
      customSpec:
        enabled: true
        serverHost: localhost-mc-psmdb
        secretRef:
          name: mc-psmdb-secret
