apiVersion: kuttl.dev/v1
kind: TestStep
timeout: 10
---
apiVersion: everest.percona.com/v2alpha1
kind: DataStore
metadata:
  name: psmdb-mc
spec:
  provider: psmdb
  components:
    engine:
      resources:
        limits:
          memory: 32G
    monitoring:
      resources:
        requests:
          memory: 330M
        limits:
          cpu: 330m
