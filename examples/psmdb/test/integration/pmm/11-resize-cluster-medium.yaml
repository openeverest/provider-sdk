apiVersion: kuttl.dev/v1
kind: TestStep
timeout: 10
---
apiVersion: everest.percona.com/v2alpha1
kind: DataStore
metadata:
  name: psmdb-mc
spec:
  provider: psmdb
  components:
    engine:
      type: mongod
      replicas: 3
      resources:
        limits:
          memory: 8G
    proxy:
      type: mongod
      replicas: 1
    monitoring:
      type: pmm
      version: 2.44.1
      resources:
        requests:
          cpu: 220m
        limits:
          memory: 220M
      customSpec:
        serverHost: localhost-mc-psmdb
        secretRef:
          name: mc-psmdb-secret
