apiVersion: kuttl.dev/v1
kind: TestStep
timeout: 10
---
apiVersion: everest.percona.com/v2alpha1
kind: DataStore
metadata:
  name: test-psmdb-cluster
spec:
  provider: psmdb
  topology:
    type: sharded
    config:
      numShards: 3
  components:
    engine:
      type: mongod
      replicas: 3
      resources:
        limits:
          cpu: "1"
          memory: 4G
      storage:
        size: 25Gi
    proxy:
      type: mongod
      replicas: 3
    configServer:
      type: mongod
      replicas: 3
      storage:
        size: 25Gi
