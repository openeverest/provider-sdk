apiVersion: kuttl.dev/v1
kind: TestStep
timeout: 30
---
apiVersion: everest.percona.com/v2alpha1
kind: DataStore
metadata:
  name: psmdb-shdc
spec:
  provider: psmdb
  components:
    engine:
      type: mongod
      replicas: 3
      resources:
        cpu: "1"
        memory: 4G
      storage:
        size: 1Gi
      customSpec:
        splitHorizonDNSRef:
          name: shdc-psmdb
