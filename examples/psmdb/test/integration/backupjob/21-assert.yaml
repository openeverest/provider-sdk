apiVersion: kuttl.dev/v1
kind: TestAssert
timeout: 30
collectors:
  - command: kubectl get backupstorage/test-storage-s3 -n ${NAMESPACE} -o yaml
  - command: kubectl get secret/test-psmdb-cluster-backup-s3 -n ${NAMESPACE} -o yaml

  - command: kubectl get dst/test-psmdb-cluster -n ${NAMESPACE} -o yaml
  - command: kubectl get psmdb/test-psmdb-cluster -n ${NAMESPACE} -o yaml

  - command: kubectl get bj/test-db-backup-s3 -n ${NAMESPACE} -o yaml
  # - command: kubectl get psmdb-backup/test-db-backup-s3 -n ${NAMESPACE} -o yaml

  # - command: kubectl get deploy/everest-controller-manager -n everest-system -o yaml
  # - type: pod
  #   namespace: everest-system
  #   selector: control-plane=controller-manager
  #   tail: 100
resourceRefs:
  - apiVersion: everest.percona.com/v2alpha1
    kind: DataStore
    name: test-psmdb-cluster
    ref: dst
  - apiVersion: psmdb.percona.com/v1
    kind: PerconaServerMongoDB
    name: test-psmdb-cluster
    ref: psmdb
  - apiVersion: everest.percona.com/v2alpha1
    kind: BackupJob
    name: test-db-backup-s3
    ref: bj_s3
  # - apiVersion: psmdb.percona.com/v1
  #   kind: PerconaServerMongoDBBackup
  #   name: test-db-backup-s3
  #   ref: psmdbb_s3
  - apiVersion: everest.percona.com/v1alpha1
    kind: BackupStorage
    name: test-storage-s3
    ref: bs_s3
assertAll:
  # - celExpr: "has(dst.metadata.finalizers)"
  #   message: "dst doesn't have finalizers"

  # - celExpr: "'everest.percona.com/upstream-cluster-cleanup' in dst.metadata.finalizers"
  #   message: "'everest.percona.com/upstream-cluster-cleanup' is absent in dst.metadata.finalizers"

  # - celExpr: "'foregroundDeletion' in dst.metadata.finalizers"
  #   message: "foregroundDeletion' is absent in dst.metadata.finalizers"

  # - celExpr: "has(bj_s3.metadata.finalizers)"
  #   message: "bj_s3 doesn't have finalizers"

  # - celExpr: "'foregroundDeletion' in bj_s3.metadata.finalizers"
  #   message: "foregroundDeletion' is absent in bj_s3.metadata.finalizers"

  # - celExpr: "has(bj_s3.status.created)"
  #   message: "bj_s3 doesn't have status.created field"

  # - celExpr: "!has(bj_s3.status.completed)"
  #   message: "bj_s3 has unexpected status.completed field"

  # - celExpr: "'everest.percona.com/in-use-protection' in bj_s3.metadata.finalizers"
  #   message: "'everest.percona.com/in-use-protection' absent in bj_s3.metadata.finalizers"

  # - celExpr: "has(psmdbb_s3.metadata.finalizers)"
  #   message: "psmdbb_s3 doesn't have finalizers"

  # - celExpr: "'percona.com/delete-backup' in psmdbb_s3.metadata.finalizers"
  #   message: "'percona.com/delete-backup' is absent in psmdbb_s3.metadata.finalizers"

  # - celExpr: "has(bs_s3.metadata.finalizers)"
  #   message: "bs_s3 doesn't have finalizers"

  # - celExpr: "'everest.percona.com/in-use-protection' in bs_s3.metadata.finalizers"
  #   message: "'everest.percona.com/in-use-protection' is absent in bs_s3.metadata.finalizers"
---
apiVersion: everest.percona.com/v2alpha1
kind: DataStore
metadata:
  name: test-psmdb-cluster
spec:
  provider: psmdb
  components:
    engine:
      type: mongod
      replicas: 1
      resources:
        cpu: "1"
        memory: 4G
      storage:
        size: 1Gi
status:
  # status: ready
  phase: Running
---
apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDB
metadata:
  name: test-psmdb-cluster
spec:
  backup:
    enabled: true
    storages:
      test-storage-s3:
        main: true
        type: s3
        s3:
          bucket: test-backup-bucket
          credentialsSecret: test-psmdb-cluster-backup-s3
          endpointUrl: s3.amazonaws.com
          insecureSkipTLSVerify: true
          region: us-east-2
status:
  state: ready
---
apiVersion: everest.percona.com/v2alpha1
kind: BackupJob
metadata:
  name: test-db-backup-s3
  # labels:
  #   clusterName: test-psmdb-cluster
  # ownerReferences:
  #   - apiVersion: everest.percona.com/v1alpha1
  #     kind: DatabaseCluster
  #     blockOwnerDeletion: true
  #     controller: true
  #     name: test-psmdb-cluster
spec:
  backupToolName: everest-percona-psmdb-operator
  destination:
    backupStorageName: test-storage-s3
  sourceClusterName: test-psmdb-cluster
# status:
#   state: Starting
#   inUse: true
---
apiVersion: psmdb.percona.com/v1
kind: PerconaServerMongoDBBackup
metadata:
  name: test-db-backup-s3
  ownerReferences:
    - apiVersion: everest.percona.com/v2alpha1
      blockOwnerDeletion: true
      kind: BackupJob
      name: test-db-backup-s3
spec:
  storageName: test-storage-s3
  clusterName: test-psmdb-cluster
status:
  state: requested
---
apiVersion: everest.percona.com/v1alpha1
kind: BackupStorage
metadata:
  name: test-storage-s3
# status:
#   inUse: true
