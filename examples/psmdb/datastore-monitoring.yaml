apiVersion: everest.percona.com/v2alpha1
kind: DataStore
metadata:
  name: psmdb-exporter
  namespace: everest
spec:
  # Provider identifier
  provider: psmdb

  # Topology is optional - will use provider's default (typically "replicaset")
  # If omitted, the provider determines the default topology

  # Components with smart defaults
  components:
    # Engine is the only required component for default topology
    engine:
      type: mongod
      # Version is optional - will use default from provider metadata
      # version: 8.0.8-3
      replicas: 3
      storage:
        size: 10Gi

    # Optional: backup agent
    backupAgent:
      type: backup
      # version: 2.9.1
      replicas: 1

    # Optional: monitoring
    monitoring:
      type: pmm
      config:
      customSpec:
        serverHost: pmm-server-everest

    # Optional: metrics - configured as exporter
    metrics:
      type: exporter
      # version: 0.47.2
